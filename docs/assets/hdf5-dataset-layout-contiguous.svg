<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">HDF5 contiguous dataset layout</title>
  <desc id="desc">Technical SVG diagram showing HDF5 contiguous dataset layout where the dataset payload is stored in one continuous raw data region.</desc>

  <defs>
    <style>
      text {
        font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        fill: #1f2933;
      }
      .outline { stroke: #2f3742; stroke-width: 2; fill: #ffffff; }
      .muted { stroke: #5b6673; stroke-width: 1.6; fill: #ffffff; }
      .blue { stroke: #4f7ea8; stroke-width: 2.1; fill: #f8fbff; }
      .blue-fill { fill: #eef5fb; stroke: #4f7ea8; stroke-width: 1.8; }
      .dash { stroke: #7c8a99; stroke-width: 1.8; stroke-dasharray: 8 7; fill: none; }
      .label { font-size: 21px; font-weight: 600; }
      .section { font-size: 19px; font-weight: 600; }
      .summary { font-size: 24px; font-weight: 600; }
      .bullet { font-size: 19px; }
      .callout { font-size: 17px; font-weight: 500; fill: #365f84; }
      .caution { font-size: 17px; font-weight: 600; fill: #5f4a16; }
      .fine { font-size: 16px; fill: #44505c; }
      .footer { font-size: 22px; font-style: italic; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f7ea8"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"></rect>

  <!-- outer frame -->
  <rect x="70" y="60" width="1260" height="780" rx="6" ry="6" class="muted"></rect>
  <text x="700" y="95" class="summary center">HDF5 Dataset Layout</text>
  <line x1="95" y1="118" x2="1305" y2="118" stroke="#c9d1d9" stroke-width="1.4"></line>

  <!-- central teaching point -->
  <text x="700" y="155" class="callout center">Contiguous layout stores the dataset payload in one continuous raw data region</text>

  <!-- object header -->
  <rect x="150" y="200" width="690" height="300" rx="4" ry="4" class="outline"></rect>
  <rect x="150" y="200" width="690" height="54" rx="4" ry="4" class="outline"></rect>
  <text x="495" y="227" class="label center">Object Header</text>

  <!-- object header compartments -->
  <rect x="190" y="285" width="150" height="60" class="muted"></rect>
  <rect x="340" y="285" width="150" height="60" class="muted"></rect>
  <rect x="490" y="285" width="150" height="60" class="muted"></rect>

  <text x="265" y="315" class="section center">Metadata</text>
  <text x="415" y="315" class="section center">Datatype</text>
  <text x="565" y="315" class="section center">Dataspace</text>

  <rect x="190" y="375" width="610" height="58" class="blue-fill"></rect>
  <text x="495" y="404" class="section center" fill="#365f84">Storage Layout: Contiguous</text>

  <rect x="190" y="433" width="610" height="42" class="muted"></rect>
  <text x="495" y="454" class="section center">Data Offset</text>

  <!-- raw data block -->
  <rect x="150" y="575" width="690" height="110" rx="3" ry="3" class="outline"></rect>
  <text x="495" y="602" class="label center">Dataset Raw Data</text>
  <line x1="150" y1="620" x2="840" y2="620" stroke="#5b6673" stroke-width="1.6"></line>

  <!-- subtle regular internal pattern -->
  <g>
    <rect x="190" y="635" width="600" height="30" fill="#f7f9fb" stroke="#7c8a99" stroke-width="1"></rect>
    <line x1="230" y1="635" x2="230" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="270" y1="635" x2="270" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="310" y1="635" x2="310" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="350" y1="635" x2="350" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="390" y1="635" x2="390" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="430" y1="635" x2="430" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="470" y1="635" x2="470" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="510" y1="635" x2="510" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="550" y1="635" x2="550" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="590" y1="635" x2="590" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="630" y1="635" x2="630" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="670" y1="635" x2="670" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="710" y1="635" x2="710" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
    <line x1="750" y1="635" x2="750" y2="665" stroke="#9aa6b2" stroke-width="1"></line>
  </g>

  <!-- arrow from contiguous metadata to raw data -->
  <line x1="495" y1="475" x2="495" y2="558" stroke="#4f7ea8" stroke-width="2.2" marker-end="url(#arrowBlue)"></line>

  <!-- single extent dashed outline / bracket -->
  <rect x="165" y="560" width="660" height="140" rx="8" ry="8" class="dash"></rect>
  <line x1="310" y1="720" x2="680" y2="720" stroke="#4f7ea8" stroke-width="1.8"></line>
  <line x1="310" y1="720" x2="310" y2="705" stroke="#4f7ea8" stroke-width="1.8"></line>
  <line x1="680" y1="720" x2="680" y2="705" stroke="#4f7ea8" stroke-width="1.8"></line>
  <text x="495" y="745" class="callout center">Single raw data extent</text>

  <!-- absence notes -->
  <text x="890" y="245" class="fine">No chunk index</text>
  <text x="890" y="271" class="fine">No separate chunk blocks</text>
  <text x="890" y="297" class="fine">No per-chunk filtering</text>

  <!-- right side bullets -->
  <g transform="translate(915,340)">
    <circle cx="10" cy="14" r="4.2" fill="#4f7ea8"></circle>
    <text x="28" y="20" class="bullet">Stored as one continuous block</text>

    <circle cx="10" cy="72" r="4.2" fill="#4f7ea8"></circle>
    <text x="28" y="78" class="bullet">Efficient for full-dataset reads and writes</text>

    <circle cx="10" cy="130" r="4.2" fill="#4f7ea8"></circle>
    <text x="28" y="136" class="bullet">Low metadata overhead</text>

    <circle cx="10" cy="188" r="4.2" fill="#4f7ea8"></circle>
    <text x="28" y="182" class="bullet">Best for small to medium datasets</text>
    <text x="28" y="212" class="bullet">read or written in one shot</text>
  </g>

  <!-- caution box -->
  <rect x="915" y="610" width="325" height="68" rx="5" ry="5" fill="#fffaf0" stroke="#c4a85a" stroke-width="1.8"></rect>
  <polygon points="940,644 953,620 966,644" fill="#f3d36a" stroke="#8b6f2b" stroke-width="1.4"></polygon>
  <text x="986" y="639" class="caution">No chunk-based compression or</text>
  <text x="986" y="661" class="caution">efficient partial I/O</text>

  <!-- footer -->
  <line x1="120" y1="770" x2="1280" y2="770" stroke="#c9d1d9" stroke-width="1.4"></line>
  <text x="120" y="805" class="footer">Example: full vector, matrix, or fixed-size dense array</text>
  <text x="1280" y="806" class="label" text-anchor="end" fill="#365f84">Contiguous = simple layout + full I/O + low overhead</text>
</svg>