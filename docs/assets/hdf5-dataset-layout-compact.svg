<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">HDF5 compact dataset layout</title>
  <desc id="desc">Technical SVG diagram showing HDF5 compact dataset layout where stored dataset bytes are embedded directly inside the object header.</desc>

  <defs>
    <style>
      text {
        font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        fill: #1f2933;
      }
      .outline { stroke: #2f3742; stroke-width: 2; fill: #ffffff; }
      .muted { stroke: #5b6673; stroke-width: 1.6; fill: #ffffff; }
      .blue { stroke: #4f7ea8; stroke-width: 2.1; fill: #f8fbff; }
      .blue-fill { fill: #eef5fb; stroke: #4f7ea8; stroke-width: 1.8; }
      .label { font-size: 21px; font-weight: 600; }
      .small { font-size: 15px; }
      .body { font-size: 18px; }
      .bullet { font-size: 19px; }
      .summary { font-size: 24px; font-weight: 600; }
      .fine { font-size: 16px; fill: #44505c; }
      .section { font-size: 19px; font-weight: 600; }
      .callout { font-size: 17px; font-weight: 500; fill: #365f84; }
      .caution { font-size: 17px; font-weight: 600; fill: #5f4a16; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .footer { font-size: 22px; font-style: italic; }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f7ea8"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"></rect>

  <!-- outer frame -->
  <rect x="70" y="60" width="1260" height="780" rx="6" ry="6" class="muted"></rect>
  <text x="700" y="95" class="summary center">HDF5 Dataset Layout</text>
  <line x1="95" y1="118" x2="1305" y2="118" stroke="#c9d1d9" stroke-width="1.4"></line>

  <!-- headline teaching point -->
  <text x="700" y="155" class="callout center">Compact layout stores the dataset bytes directly inside the object header</text>

  <!-- dominant object header -->
  <rect x="175" y="205" width="760" height="390" rx="4" ry="4" class="outline"></rect>
  <rect x="175" y="205" width="760" height="54" rx="4" ry="4" class="outline"></rect>
  <text x="555" y="232" class="label center">Object Header</text>

  <!-- top compartments -->
  <rect x="225" y="290" width="155" height="62" class="muted"></rect>
  <rect x="390" y="290" width="155" height="62" class="muted"></rect>
  <rect x="555" y="290" width="155" height="62" class="muted"></rect>

  <text x="302.5" y="321" class="section center">Metadata</text>
  <text x="467.5" y="321" class="section center">Datatype</text>
  <text x="632.5" y="321" class="section center">Dataspace</text>

  <!-- compact payload region -->
  <rect x="225" y="385" width="660" height="155" rx="3" ry="3" class="blue"></rect>
  <text x="555" y="420" class="section center" fill="#365f84">Compact Data Payload</text>

  <!-- stored bytes strip -->
  <rect x="255" y="450" width="600" height="52" rx="3" ry="3" class="blue-fill"></rect>
  <text x="555" y="476" class="label center" fill="#365f84">Stored Dataset Bytes</text>

  <!-- subtle byte marks -->
  <g stroke="#a8bfd4" stroke-width="1">
    <line x1="270" y1="458" x2="270" y2="494"></line>
    <line x1="284" y1="458" x2="284" y2="494"></line>
    <line x1="298" y1="458" x2="298" y2="494"></line>
    <line x1="312" y1="458" x2="312" y2="494"></line>
    <line x1="326" y1="458" x2="326" y2="494"></line>
    <line x1="340" y1="458" x2="340" y2="494"></line>
    <line x1="354" y1="458" x2="354" y2="494"></line>
    <line x1="368" y1="458" x2="368" y2="494"></line>
    <line x1="382" y1="458" x2="382" y2="494"></line>
    <line x1="396" y1="458" x2="396" y2="494"></line>
    <line x1="410" y1="458" x2="410" y2="494"></line>
    <line x1="424" y1="458" x2="424" y2="494"></line>
    <line x1="438" y1="458" x2="438" y2="494"></line>
    <line x1="452" y1="458" x2="452" y2="494"></line>
    <line x1="466" y1="458" x2="466" y2="494"></line>
    <line x1="480" y1="458" x2="480" y2="494"></line>
    <line x1="494" y1="458" x2="494" y2="494"></line>
    <line x1="508" y1="458" x2="508" y2="494"></line>
    <line x1="522" y1="458" x2="522" y2="494"></line>
    <line x1="536" y1="458" x2="536" y2="494"></line>
    <line x1="550" y1="458" x2="550" y2="494"></line>
    <line x1="564" y1="458" x2="564" y2="494"></line>
    <line x1="578" y1="458" x2="578" y2="494"></line>
    <line x1="592" y1="458" x2="592" y2="494"></line>
    <line x1="606" y1="458" x2="606" y2="494"></line>
    <line x1="620" y1="458" x2="620" y2="494"></line>
    <line x1="634" y1="458" x2="634" y2="494"></line>
    <line x1="648" y1="458" x2="648" y2="494"></line>
    <line x1="662" y1="458" x2="662" y2="494"></line>
    <line x1="676" y1="458" x2="676" y2="494"></line>
    <line x1="690" y1="458" x2="690" y2="494"></line>
    <line x1="704" y1="458" x2="704" y2="494"></line>
    <line x1="718" y1="458" x2="718" y2="494"></line>
    <line x1="732" y1="458" x2="732" y2="494"></line>
    <line x1="746" y1="458" x2="746" y2="494"></line>
    <line x1="760" y1="458" x2="760" y2="494"></line>
    <line x1="774" y1="458" x2="774" y2="494"></line>
    <line x1="788" y1="458" x2="788" y2="494"></line>
    <line x1="802" y1="458" x2="802" y2="494"></line>
    <line x1="816" y1="458" x2="816" y2="494"></line>
    <line x1="830" y1="458" x2="830" y2="494"></line>
  </g>

  <!-- right callout -->
  <path d="M885 476 L1010 476 L1010 430" fill="none" stroke="#4f7ea8" stroke-width="2" marker-end="url(#arrowBlue)"></path>
  <rect x="1015" y="406" width="240" height="48" rx="4" ry="4" class="blue-fill"></rect>
  <text x="1135" y="430" class="callout center">Data stored directly in object header</text>

  <!-- supporting bullet -->
  <circle cx="995" cy="525" r="4.2" fill="#4f7ea8"></circle>
  <text x="1012" y="531" class="bullet">Best for very small datasets</text>

  <!-- caution box -->
  <rect x="470" y="625" width="360" height="64" rx="5" ry="5" fill="#fffaf0" stroke="#c4a85a" stroke-width="1.8"></rect>
  <polygon points="495,657 508,633 521,657" fill="#f3d36a" stroke="#8b6f2b" stroke-width="1.4"></polygon>
  <text x="545" y="663" class="caution">No chunking, no compression, limited size</text>

  <!-- simple reinforcing note -->
  <text x="975" y="610" class="fine">No separate storage blocks</text>
  <text x="975" y="636" class="fine">No chunk index</text>
  <text x="975" y="662" class="fine">No external raw data extent</text>

  <!-- footer -->
  <line x1="120" y1="770" x2="1280" y2="770" stroke="#c9d1d9" stroke-width="1.4"></line>
  <text x="120" y="805" class="footer">Example: small fixed-size vector or scalar array</text>
  <text x="1280" y="806" class="label" text-anchor="end" fill="#365f84">Compact = metadata + data together</text>
</svg>