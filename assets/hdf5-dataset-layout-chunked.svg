<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">HDF5 chunked dataset layout</title>
  <desc id="desc">Technical SVG diagram showing HDF5 chunked dataset layout with object header, chunk index mapping, separate chunk storage, partial I/O, and filters.</desc>

  <defs>
    <style>
      text {
        font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        fill: #1f2933;
      }

      .frame {
        fill: #ffffff;
        stroke: #d8e0e8;
        stroke-width: 1.8;
      }

      .panel {
        fill: #ffffff;
        stroke: #2f3742;
        stroke-width: 1.8;
      }

      .panel_soft {
        fill: #fbfcfe;
        stroke: #c9d3dd;
        stroke-width: 1.5;
      }

      .panel_blue {
        fill: #eef5fb;
        stroke: #4f7ea8;
        stroke-width: 1.6;
      }

      .storage {
        fill: #fcfdff;
        stroke: #8a97a6;
        stroke-width: 1.6;
        stroke-dasharray: 7 6;
      }

      .chunk {
        fill: #ffffff;
        stroke: #46515d;
        stroke-width: 1.6;
      }

      .chunk_hi {
        fill: #f3f8fd;
        stroke: #4f7ea8;
        stroke-width: 2;
      }

      .grid_fill {
        fill: #f7f9fb;
        stroke: #95a3b3;
        stroke-width: 1;
      }

      .grid_fill_hi {
        fill: #eaf3fb;
        stroke: #6f95b8;
        stroke-width: 1;
      }

      .rule {
        stroke: #d6dde5;
        stroke-width: 1.2;
      }

      .rule_dark {
        stroke: #5f6b78;
        stroke-width: 1.4;
      }

      .rule_blue {
        stroke: #4f7ea8;
        stroke-width: 1.8;
      }

      .grid_line {
        stroke: #a7b3bf;
        stroke-width: 1;
      }

      .grid_line_hi {
        stroke: #85a3bf;
        stroke-width: 1;
      }

      .title {
        font-size: 30px;
        font-weight: 700;
      }

      .subtitle {
        font-size: 16px;
        fill: #5e6a76;
      }

      .label {
        font-size: 22px;
        font-weight: 650;
      }

      .section {
        font-size: 18px;
        font-weight: 600;
      }

      .body {
        font-size: 17px;
        fill: #41505d;
      }

      .small {
        font-size: 15px;
        fill: #5c6874;
      }

      .callout {
        font-size: 16px;
        font-weight: 600;
        fill: #365f84;
      }

      .chunk_label {
        font-size: 17px;
        font-weight: 650;
      }

      .bullet {
        font-size: 18px;
      }

      .footer {
        font-size: 20px;
        font-style: italic;
        fill: #46525e;
      }

      .summary {
        font-size: 21px;
        font-weight: 650;
        fill: #365f84;
      }

      .caution {
        font-size: 16px;
        font-weight: 600;
        fill: #5f4a16;
      }

      .center {
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>

    <marker id="arrow_blue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f7ea8"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>

  <!-- outer frame -->
  <rect x="62" y="54" width="1276" height="792" rx="12" ry="12" class="frame"/>

  <!-- header -->
  <text x="700" y="100" class="title center">HDF5 Chunked Dataset Layout</text>
  <text x="700" y="128" class="subtitle center">Indexed chunks enable partial access, filtering, and scalable storage</text>
  <line x1="96" y1="152" x2="1304" y2="152" class="rule"/>

  <!-- left main object header panel -->
  <rect x="110" y="182" width="770" height="230" rx="10" ry="10" class="panel"/>
  <rect x="110" y="182" width="770" height="54" rx="10" ry="10" class="panel_soft"/>
  <text x="495" y="209" class="label center">Object Header</text>

  <!-- header compartments -->
  <rect x="152" y="262" width="176" height="56" rx="6" ry="6" class="panel_soft"/>
  <rect x="342" y="262" width="176" height="56" rx="6" ry="6" class="panel_soft"/>
  <rect x="532" y="262" width="176" height="56" rx="6" ry="6" class="panel_soft"/>
  <rect x="152" y="338" width="678" height="56" rx="6" ry="6" class="panel_blue"/>

  <text x="240" y="290" class="section center">Metadata</text>
  <text x="430" y="290" class="section center">Datatype</text>
  <text x="620" y="290" class="section center">Dataspace</text>
  <text x="491" y="366" class="section center">Chunk Index / B-tree / Mapping</text>
  <!-- right explanatory callout -->
  <text x="916" y="210" class="callout">
    <tspan x="916" dy="0">Object Header</tspan>
    <tspan x="916" dy="1.35em">→ Chunk Index / Mapping</tspan>
    <tspan x="916" dy="1.35em">→ Separate Chunk Storage</tspan>
  </text>
  <!-- storage region -->
  <rect x="110" y="455" width="770" height="285" rx="12" ry="12" class="storage"/>
  <text x="130" y="440" class="small">Separate Chunk Storage</text>

  <!-- chunk 00 -->
  <g id="chunk00">
    <rect x="172" y="505" width="210" height="108" rx="8" ry="8" class="chunk"/>
    <line x1="172" y1="548" x2="382" y2="548" class="rule_dark"/>
    <text x="277" y="527" class="chunk_label center">Chunk [0,0]</text>

    <rect x="196" y="564" width="144" height="30" rx="3" ry="3" class="grid_fill"/>
    <line x1="232" y1="564" x2="232" y2="594" class="grid_line"/>
    <line x1="268" y1="564" x2="268" y2="594" class="grid_line"/>
    <line x1="304" y1="564" x2="304" y2="594" class="grid_line"/>
    <line x1="340" y1="564" x2="340" y2="594" class="grid_line"/>
    <line x1="196" y1="579" x2="340" y2="579" class="grid_line"/>
  </g>
  <!-- chunk 01 -->
  <g id="chunk01">
    <rect x="412" y="505" width="210" height="108" rx="8" ry="8" class="chunk"/>
    <line x1="412" y1="548" x2="622" y2="548" class="rule_dark"/>
    <text x="517" y="527" class="chunk_label center">Chunk [0,1]</text>

    <rect x="436" y="564" width="144" height="30" rx="3" ry="3" class="grid_fill"/>
    <line x1="472" y1="564" x2="472" y2="594" class="grid_line"/>
    <line x1="508" y1="564" x2="508" y2="594" class="grid_line"/>
    <line x1="544" y1="564" x2="544" y2="594" class="grid_line"/>
    <line x1="580" y1="564" x2="580" y2="594" class="grid_line"/>
    <line x1="436" y1="579" x2="580" y2="579" class="grid_line"/>
  </g>
  <!-- chunk 10 highlighted -->
  <g id="chunk10">
    <rect x="172" y="635" width="210" height="108" rx="8" ry="8" class="chunk_hi"/>
    <line x1="172" y1="678" x2="382" y2="678" class="rule_blue"/>
    <text x="277" y="657" class="chunk_label center" fill="#365f84">Chunk [1,0]</text>

    <rect x="196" y="694" width="144" height="30" rx="3" ry="3" class="grid_fill_hi"/>
    <line x1="232" y1="694" x2="232" y2="724" class="grid_line_hi"/>
    <line x1="268" y1="694" x2="268" y2="724" class="grid_line_hi"/>
    <line x1="304" y1="694" x2="304" y2="724" class="grid_line_hi"/>
    <line x1="340" y1="694" x2="340" y2="724" class="grid_line_hi"/>
    <line x1="196" y1="709" x2="340" y2="709" class="grid_line_hi"/>
  </g>
  <!-- chunk 11 -->
  <g id="chunk11">
    <rect x="412" y="635" width="210" height="108" rx="8" ry="8" class="chunk"/>
    <line x1="412" y1="678" x2="622" y2="678" class="rule_dark"/>
    <text x="517" y="657" class="chunk_label center">Chunk [1,1]</text>

    <rect x="436" y="694" width="144" height="30" rx="3" ry="3" class="grid_fill"/>
    <line x1="472" y1="694" x2="472" y2="724" class="grid_line"/>
    <line x1="508" y1="694" x2="508" y2="724" class="grid_line"/>
    <line x1="544" y1="694" x2="544" y2="724" class="grid_line"/>
    <line x1="580" y1="694" x2="580" y2="724" class="grid_line"/>
    <line x1="436" y1="709" x2="580" y2="709" class="grid_line"/>
  </g>
  <!-- arrows from mapping -->
  <line x1="491" y1="394" x2="277" y2="486" stroke="#4f7ea8" stroke-width="1.9" marker-end="url(#arrow_blue)"/>
  <line x1="491" y1="394" x2="517" y2="486" stroke="#4f7ea8" stroke-width="1.9" marker-end="url(#arrow_blue)"/>
  <line x1="491" y1="394" x2="277" y2="616" stroke="#4f7ea8" stroke-width="1.9" marker-end="url(#arrow_blue)"/>
  <line x1="491" y1="394" x2="517" y2="616" stroke="#4f7ea8" stroke-width="1.9" marker-end="url(#arrow_blue)"/>
  <!-- highlight callout -->
  <path d="M632 660 L742 660 L742 620" fill="none" stroke="#4f7ea8" stroke-width="1.9" marker-end="url(#arrow_blue)"/>
  <rect x="748" y="598" width="250" height="52" rx="8" ry="8" class="panel_blue"/>
  <text x="873" y="624" class="callout center">Read/write only the needed chunk</text>
  <!-- filter badge -->
  <rect x="650" y="672" width="225" height="52" rx="8" ry="8" class="panel_blue"/>
  <text x="763" y="698" class="callout center">gzip / shuffle / checksum</text>
  <!-- right-side bullet column -->
  <g transform="translate(916,292)">
    <circle cx="0" cy="0" r="4.5" fill="#4f7ea8"/> <text x="18" y="6" class="bullet">Dataset split into independently stored chunks</text>
    <circle cx="0" cy="62" r="4.5" fill="#4f7ea8"/> <text x="18" y="68" class="bullet">Efficient partial I/O</text>
    <circle cx="0" cy="124" r="4.5" fill="#4f7ea8"/> <text x="18" y="130" class="bullet">Required for compression and filters</text>
    <circle cx="0" cy="186" r="4.5" fill="#4f7ea8"/> <text x="18" y="192" class="bullet">Good for append-style workflows and h5::pt_t</text>
  </g>
  <!-- caution box -->
<g transform="translate(0,0)">
  <g transform="translate(0,0)">
    <rect x="910" y="520" width="420" height="68" rx="10" ry="10" fill="#fffaf0" stroke="#c4a85a" stroke-width="1.5"/>
    <polygon points="928,554 943,528 958,554" fill="#f3d36a" stroke="#8b6f2b" stroke-width="1.2"/>
    <text x="943" y="547" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="700" fill="#5f4a16">!</text>
  </g>
  <text x="975" y="554" class="caution" dominant-baseline="middle">More metadata overhead than contiguous layout</text>
</g>
  <!-- footer -->
  <line x1="110" y1="780" x2="1290" y2="780" class="rule"/>
  <text x="110" y="812" class="footer">Example: matrix, tensor, time series, or tiled simulation output</text>
  <text x="1290" y="812" class="summary" text-anchor="end">Chunked = indexed blocks + partial access + filters</text>
</svg>